name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # 로컬 저장 모드 컨버터(robolabel)는 optional extra라 CI에선 제외 —
      # 코어 브리지만으로 유닛 검증 (실기 e2e·로컬 모드는 수동)
      - run: uv sync
      - run: uv run python -m compileall -q bridge robot scripts gui
      - run: uv run --with pytest pytest tests/ -q
